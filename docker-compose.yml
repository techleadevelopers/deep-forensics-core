version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: PixelAudit
      POSTGRES_PASSWORD: PixelAudit
      POSTGRES_DB: PixelAudit
    ports: ["55432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations/001_initial.sql:/docker-entrypoint-initdb.d/001_initial.sql:ro

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  nats:
    image: nats:2.10-alpine
    command: ["-js"]
    ports: ["4222:4222", "8222:8222"]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000", "9001:9001"]
    volumes: ["miniodata:/data"]

  minio-init:
    image: minio/mc:latest
    depends_on: [minio]
    entrypoint: >
      /bin/sh -c "
        sleep 3;
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb -p local/pixelaudit-evidence || true;
        mc anonymous set download local/pixelaudit-evidence;
      "

  api:
    build: .
    depends_on: [postgres, redis, nats, minio]
    environment:
      ENV: development
      PORT: "8080"
      DATABASE_URL: postgres://PixelAudit:PixelAudit@postgres:5432/PixelAudit?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      NATS_URL: nats://nats:4222
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: pixelaudit-evidence
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_REGION: us-east-1
      JWT_SECRET: dev-only-change-me
      RATE_LIMIT_PER_MIN: "120"
      ONNX_MODEL_PATH: /internal/model/ai_detector_v1.2.0.onnx
    ports: ["8080:8080"]

  worker:
    build: .
    depends_on: [postgres, nats, minio]
    command: ["/app/worker"]
    environment:
      DATABASE_URL: postgres://PixelAudit:PixelAudit@postgres:5432/PixelAudit?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      NATS_URL: nats://nats:4222
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: pixelaudit-evidence
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      JWT_SECRET: dev-only-change-me
      ONNX_MODEL_PATH: /internal/model/ai_detector_v1.2.0.onnx
    deploy:
      replicas: 2

volumes:
  pgdata:
  miniodata:
